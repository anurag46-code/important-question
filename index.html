<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Question</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff6b6b, #ffa8a8, #ffd8d8);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            margin: 20px;
            max-width: 90%;
        }

        h1 {
            color: #e74c3c;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            line-height: 1.3;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
            min-height: 44px;
        }

        #yesBtn {
            background: #2ecc71;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        #noBtn {
            background: #e74c3c;
            color: white;
            position: absolute;
            transition: all 0.1s ease;
            min-width: 80px;
            min-height: 44px;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .heart {
            position: absolute;
            width: clamp(15px, 4vw, 20px);
            height: clamp(15px, 4vw, 20px);
            background: #ff6b6b;
            transform: rotate(45deg);
            animation: float 6s infinite linear;
        }

        .heart:before,
        .heart:after {
            content: '';
            position: absolute;
            width: clamp(15px, 4vw, 20px);
            height: clamp(15px, 4vw, 20px);
            background: #ff6b6b;
            border-radius: 50%;
        }

        .heart:before {
            top: -10px;
            left: 0;
        }

        .heart:after {
            top: 0;
            left: -10px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(45deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) rotate(45deg);
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f39c12;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <div class="container">
        <h1>Do you love me? 💕</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! 💖</button>
            <button id="noBtn">No ❌</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const hearts = document.getElementById('hearts');

        // Create floating hearts
        function createHearts() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDelay = Math.random() * 6 + 's';
                    hearts.appendChild(heart);
                }, i * 300);
            }
        }

        // Make No button run away
        function moveNoButton() {
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 50;
            
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;
            
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
            noBtn.style.position = 'fixed';
        }

        // Touch events for mobile
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            moveNoButton();
        });

        // Mouse events for desktop
        noBtn.addEventListener('mouseover', moveNoButton);

        // Yes button celebration
        yesBtn.addEventListener('click', function() {
            document.body.innerHTML = `
                <div style="
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    min-height: 100vh;
                    background: linear-gradient(45deg, #ff6b6b, #ffa8a8);
                    color: white;
                    font-family: Arial, sans-serif;
                    text-align: center;
                ">
                    <div>
                        <h1 style="font-size: clamp(2rem, 8vw, 3em); margin-bottom: 20px;">Yay! 💖🎉</h1>
                        <p style="font-size: clamp(1rem, 4vw, 1.5em);">I knew it! You're the best! 💕</p>
                    </div>
                </div>
            `;
            
            // Create confetti
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(confetti);
                }, i * 50);
            }
        });

        // Start animations
        createHearts();
        
        // Initial random position for No button
        noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        noBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        noBtn.style.position = 'fixed';

        // Prevent zoom on double-tap (iOS)
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent context menu on long press
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
